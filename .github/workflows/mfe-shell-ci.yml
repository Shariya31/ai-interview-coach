name: CI - MFE Shell

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mfe-shell

    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Lint check
        run: npm run lint --if-present

      - name: 🏗️ Build Vite app
        run: npm run build

      - name: 🐳 Build Docker image
        run: |
          docker build -t mfe-shell:ci .
